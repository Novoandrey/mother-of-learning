name: Deploy to staging (gate + Dokploy)

# spec-043 US3: push to staging -> quality gate (lint + tsc + vitest) -> on
# green, trigger the staging Dokploy app via API. Mirror of deploy.yml.

on:
  push:
    branches: [staging]
    paths-ignore:
      - '**/*.md'
      - '.specify/**'
      - 'chatlog/**'
      - 'scripts/dev/**'
      - 'infra/**'
      - 'meta/**'

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  gate:
    name: Quality gate (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mat-ucheniya
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mat-ucheniya/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  deploy:
    name: Trigger Dokploy deploy (staging)
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Call Dokploy deploy API
        env:
          DOKPLOY_URL: https://panel.theloopers.org
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          DOKPLOY_APP_ID: ${{ secrets.DOKPLOY_STAGING_APP_ID }}
        run: |
          curl --fail-with-body -sS -X POST \
            "$DOKPLOY_URL/api/application.deploy" \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -H "x-api-key: $DOKPLOY_API_TOKEN" \
            -d "{\"applicationId\":\"$DOKPLOY_APP_ID\"}"
